<div class="booking-container">
  <button class="back-btn" (click)="goBack()">← Quay lại</button>

  <h2 *ngIf="event">Đặt vé: {{ event.name }}</h2>

  <div class="tickets-list">
    <div class="ticket-item" *ngFor="let ticket of tickets">
      <div class="ticket-info">
        <h4>{{ ticket.type }}</h4>
        <p class="price">{{ ticket.price | currency:'VND':'symbol':'1.0-0' }}</p>
        <p class="available">Còn lại: {{ ticket.available }}</p>
      </div>

      <div class="quantity-control">
  <button type="button" 
          (click)="updateQuantity(ticket.id, (selectedTickets[ticket.id] || 0) - 1)"
          [disabled]="(selectedTickets[ticket.id] || 0) <= 0">
    -
  </button>

  <input 
  type="number" 
  [value]="selectedTickets[ticket.id] || 0"
  (input)="onQuantityInput(ticket.id, $event)"
  [min]="0" 
  [max]="ticket.available"
  class="quantity-input">

  <button type="button"
          (click)="updateQuantity(ticket.id, (selectedTickets[ticket.id] || 0) + 1)"
          [disabled]="(selectedTickets[ticket.id] || 0) >= ticket.available">
    +
  </button>
</div>
    </div>
  </div>

  <div class="summary">
    <p>Tổng vé: <strong>{{ getTotalTickets() }}</strong></p>
    <p>Tổng tiền: <strong>{{ totalAmount | currency:'VND':'symbol':'1.0-0' }}</strong></p>
    <button class="proceed-btn" 
            (click)="proceedToPayment()"
            [disabled]="getTotalTickets() === 0">
      Tiếp tục thanh toán
    </button>
  </div>
</div>
