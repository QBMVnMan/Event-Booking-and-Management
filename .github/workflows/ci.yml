name: .NET Microservices CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-verify:
    name: Build & Docker Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore EventBookingMicroservices.slnx

      - name: Build solution
        run: dotnet build EventBookingMicroservices.slnx --configuration Release --no-restore

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build --parallel

      - name: Show Docker image sizes
        if: always()
        run: docker images --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}'

      - name: CI Summary
        if: always()
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ .NET Build: Success" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Compose: Valid" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Images: Built" >> $GITHUB_STEP_SUMMARY
          echo "- Runner: ${{ runner.os }}" >> $GITHUB_STEP_SUMMARY