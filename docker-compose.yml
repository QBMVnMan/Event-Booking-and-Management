services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: eventbooking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api-gateway:
    build:
      context: .                           # Root of repo → includes shared/
      dockerfile: api-gateway/src/ApiGateway/Dockerfile
    ports:
      - "5000:80"
    depends_on:
      - event-service
      - user-service
      - booking-service
      - payment-service
      - postgres

  event-service:
    build:
      context: .
      dockerfile: services/EventService/src/EventService.Api/Dockerfile
    ports:
      - "5001:80"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=eventbooking;Username=postgres;Password=password123

  user-service:
    build:
      context: .
      dockerfile: services/UserService/src/UserService.Api/Dockerfile
    ports:
      - "5002:80"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=eventbooking;Username=postgres;Password=password123

  booking-service:
    build:
      context: .
      dockerfile: services/BookingService/src/BookingService.Api/Dockerfile
    ports:
      - "5003:80"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=eventbooking;Username=postgres;Password=password123

  payment-service:
    build:
      context: .
      dockerfile: services/PaymentService/src/PaymentService.Api/Dockerfile
    ports:
      - "5004:80"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=eventbooking;Username=postgres;Password=password123

volumes:
  postgres_data:
